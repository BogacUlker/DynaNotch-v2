---
name: Bug Report
description: File a bug report.
title: '[Bug] '
labels:
  - bug
  - unconfirmed
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened? What are the steps to reproduce the issue?
      description: >-
        Describe the bug and include the steps to replicate the issue. Issues
        with images or videos will be resolved faster.
      placeholder: Clearly explain the issue. Please limit each post to one issue.
    validations:
      required: true
  - type: textarea
    id: expected-behaviour
    attributes:
      label: What did you expect to happen?
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true
  - type: dropdown
    id: version
    attributes:
      label: DynaNotch Version
      description: >-
        What version are you running? (Check in the menu bar > Settings > About)
      options:
        - Select a version
        - v1.0.0
    validations:
      required: true
  - type: input
    id: operating-system
    attributes:
      label: macOS Version
      description: Go to  > About This Mac
    validations:
      required: true
  - type: dropdown
    id: music-source
    attributes:
      label: Music Source (if relevant)
      description: >-
        If this issue is related to music, what music source did you select in
        DynaNotch settings?
      options:
        - Now Playing
        - Apple Music
        - Spotify
        - YouTube Music
    validations:
      required: false
  - type: input
    id: music-app
    attributes:
      label: Music App (if using Now Playing)
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: >-
        Please copy and paste any relevant log output. This will be
        automatically formatted into code, so no need for backticks.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I have searched existing issues to ensure this isn't a duplicate.
          required: true
