name: Feature Request
description: Suggest a new idea or enhancement for DynaNotch
title: "[Feature] "
labels: [enhancement]

body:
  - type: markdown
    attributes:
      value: |
        ## Feature Request

        Thanks for helping make **DynaNotch** better! Please check [existing requests](https://github.com/BogacUlker/DynaNotch-v2/issues?q=is%3Aissue) before submitting to avoid duplicates.

  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: |
        Please provide a clear description of the problem or pain point this feature would address.
      placeholder: "I'm frustrated when... or It would be great if..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: |
        How should DynaNotch handle this? Describe the behavior, UI, or interaction you imagine.
      placeholder: "I would like the notch to..."
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context & screenshots
      description: |
        Add any other context, mockups, or screenshots about the feature request here.
        You can drag and drop images directly into this field.
    validations:
      required: false

  - type: checkboxes
    id: contribution
    attributes:
      label: Willingness to contribute
      options:
        - label: "I can help implement this feature"

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission checklist
      options:
        - label: "I have searched existing issues to ensure this isn't a duplicate"
          required: true
